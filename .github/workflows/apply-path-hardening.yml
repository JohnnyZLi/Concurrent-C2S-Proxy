name: Apply path hardening

on:
  push:
    paths:
      - .github/workflows/apply-path-hardening.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Apply hardened file handling
        shell: bash
        run: |
          cat > /tmp/hardening.patch <<'PATCH'
