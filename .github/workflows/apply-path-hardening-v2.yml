name: Apply corrected path hardening

on:
  push:
    paths:
      - .github/workflows/apply-path-hardening-v2.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Extract and apply tested source patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-path-hardening.yml').read_text(encoding='utf-8')
          marker = "          cat > /tmp/hardening.patch <<'PATCH'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PATCH", start)
          lines = workflow[start:end].splitlines()
          patch = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          source_start = patch.index('diff -ruN a/README.md b/README.md')
          Path('/tmp/hardening.patch').write_text(patch[source_start:], encoding='utf-8')

          ci = Path('.github/workflows/ci.yml')
          text = ci.read_text(encoding='utf-8')
          if '  workflow_dispatch:' not in text:
              text = text.replace('  pull_request:\n', '  pull_request:\n  workflow_dispatch:\n', 1)
          ci.write_text(text, encoding='utf-8')
          PY
          patch -p1 < /tmp/hardening.patch
          git diff --check

      - name: Build and test
        run: make clean && make test

      - name: Commit hardened implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/proxy.cpp src/acl.cpp tests/integration.py README.md .github/workflows/ci.yml
          git commit -m "Harden ACL and log path handling"
          git push origin HEAD:main

      - name: Start fresh CI and CodeQL scans
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run ci.yml --ref main
          gh workflow run codeql.yml --ref main
