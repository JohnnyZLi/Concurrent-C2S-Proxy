name: Apply directory-entry path fix

on:
  push:
    paths:
      - .github/directory-entry-open.trigger
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      - name: Remove user-controlled paths from filesystem calls
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import shutil

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one match in {path}, found {count}")
              path.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              Path("src/proxy.cpp"),
              "        fd_ = ::open(path_.c_str(), O_WRONLY | O_APPEND | O_CREAT | O_CLOEXEC | O_NOFOLLOW, 0600);\n",
              "        fd_ = c2s::open_runtime_file(path_, O_WRONLY | O_APPEND | O_CREAT, 0600);\n",
          )
          replace_once(
              Path("src/acl.cpp"),
              "    const int fd = ::open(path.c_str(), O_RDONLY | O_CLOEXEC | O_NOFOLLOW);\n",
              "    const int fd = open_runtime_file(path, O_RDONLY);\n",
          )

          util_hpp = Path("src/util.hpp")
          text = util_hpp.read_text(encoding="utf-8")
          if "#include <sys/types.h>" not in text:
              text = text.replace("#pragma once\n\n", "#pragma once\n\n#include <sys/types.h>\n\n", 1)
          declaration = "int open_runtime_file(const std::string& requested_name, int flags, mode_t mode = 0);\n"
          if declaration not in text:
              text = text.replace("std::string rfc3339_now();\n", "std::string rfc3339_now();\n" + declaration, 1)
          util_hpp.write_text(text, encoding="utf-8")

          util_cpp = Path("src/util.cpp")
          text = util_cpp.read_text(encoding="utf-8")
          if "#include <dirent.h>" not in text:
              text = text.replace("#include \"util.hpp\"\n\n", "#include \"util.hpp\"\n\n#include <dirent.h>\n#include <fcntl.h>\n", 1)

          implementation = r'''
int open_runtime_file(const std::string& requested_name, int flags, mode_t mode) {
    if (requested_name.empty() || requested_name == "." || requested_name == ".." ||
        requested_name.find('/') != std::string::npos ||
        requested_name.find('\\') != std::string::npos) {
        errno = EINVAL;
        return -1;
    }

    const int directory_fd = ::open(".", O_RDONLY | O_DIRECTORY | O_CLOEXEC);
    if (directory_fd < 0) {
        return -1;
    }

    DIR* directory = ::fdopendir(directory_fd);
    if (directory == nullptr) {
        const int saved_errno = errno;
        ::close(directory_fd);
        errno = saved_errno;
        return -1;
    }

    int result = -1;
    int saved_errno = 0;
    bool matched = false;
    errno = 0;
    while (dirent* entry = ::readdir(directory)) {
        if (requested_name != entry->d_name) {
            continue;
        }
        matched = true;
        const int safe_flags = (flags & ~O_CREAT) | O_CLOEXEC | O_NOFOLLOW;
        result = ::openat(dirfd(directory), entry->d_name, safe_flags, mode);
        saved_errno = errno;
        break;
    }

    if (!matched && errno != 0) {
        saved_errno = errno;
    } else if (!matched && (flags & O_CREAT) != 0 && requested_name == "access.log") {
        result = ::openat(dirfd(directory), "access.log",
                          flags | O_CLOEXEC | O_NOFOLLOW, mode);
        saved_errno = errno;
    } else if (!matched) {
        saved_errno = ENOENT;
    }

    ::closedir(directory);
    if (result < 0) {
        errno = saved_errno;
    }
    return result;
}

'''
          if "int open_runtime_file(" not in text:
              text = text.replace("std::string rfc3339_now() {\n", implementation + "std::string rfc3339_now() {\n", 1)
          util_cpp.write_text(text, encoding="utf-8")

          shutil.rmtree(".github/codeql/extensions/path-sanitizers", ignore_errors=True)
          Path(".github/directory-entry-open.trigger").unlink(missing_ok=True)
          Path(".github/workflows/apply-directory-entry-open.yml").unlink()
          PY
          git diff --check

      - name: Build and test
        run: make clean && make test

      - name: Commit verified fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove command-line paths from filesystem sinks"
          git push origin HEAD:main

      - name: Start fresh CI and CodeQL scans
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run ci.yml --ref main
          gh workflow run codeql.yml --ref main
